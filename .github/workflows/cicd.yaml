name: CICD (Dev, Staging, Prod)

on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md

  pull_request:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - LICENSE
      - README.md

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  unit-test:
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit

  # Approval gate before PR can be merged (runs only on pull_request)
  merge-approval-gate:
    needs: [build, unit-test]
    if: github.event_name == 'pull_request'
    environment: merge
    runs-on: ubuntu-latest
    steps:
      - name: approved for merge
        run: write-host "PR approved for merge"

  dev-deploy:
    needs: [build, unit-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: dev
    secrets: inherit

  staging-approval-gate:
    needs: dev-deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: approved
        env: 
          ENV_NAME: Staging
        run: write-host "Approve for $($env.ENV_NAME)"
    
  staging-deploy:
    needs: staging-approval-gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: staging
    secrets: inherit

  prod-approval-gate:
    needs: staging-deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: approved
        env: 
          ENV_NAME: prod
        run: write-host "Approve for $($env.ENV_NAME)"
    
  prod-deploy:
    needs: prod-approval-gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: prod
    secrets: inherit